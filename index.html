<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Work Organizer">
<meta name="theme-color" content="#ffffff">
<title>Work Organizer</title>
<script>
const manifestData={name:"Work Organizer",short_name:"Organizer",start_url:"./",display:"standalone",background_color:"#ffffff",theme_color:"#ffffff",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><text y='.9em' font-size='80' x='10'>📋</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifestData)],{type:'application/json'});
const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--bg4:#e2e8f0;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --accent:#0ea5e9;--accent2:#0284c7;
  --success:#16a34a;--warning:#d97706;--danger:#dc2626;
  --radius:10px;--radius-lg:14px;
  --sidebar-w:220px;--font:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100%}
.topbar{display:flex;align-items:center;gap:8px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;flex-wrap:wrap}
.topbar-title{font-size:16px;font-weight:600;flex:1;letter-spacing:-.01em;min-width:120px}
.topbar-title span{color:var(--accent)}
.topbar-item-name{font-size:14px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:10px 0 20px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:12px 16px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;font-size:14px;color:var(--text2);transition:all .15s}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--accent)}
.sb-item .ti{font-size:16px;flex-shrink:0}
.sb-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-count{font-size:11px;background:var(--bg4);border-radius:20px;padding:1px 7px;color:var(--text3)}
.sb-add-btn{margin:10px 12px 0;padding:7px 12px;border:1px dashed var(--border2);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:12px;color:var(--text3);text-align:left;width:calc(100% - 24px);transition:all .15s}
.sb-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.main-inner{padding:20px;max-width:900px;width:100%;margin:0 auto;flex:1}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.metric-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.metric-val{font-size:24px;font-weight:700}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sec-name{font-size:18px;font-weight:600;flex:1}
.hdr-btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;transition:all .15s;font-family:var(--font)}
.hdr-btn:hover{background:var(--bg3);color:var(--text)}
.hdr-btn.primary{background:var(--accent);border-color:var(--accent);color:#ffffff;font-weight:600}
.hdr-btn.primary:hover{background:var(--accent2)}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px;color:var(--text);font-family:var(--font)}
.filter-bar input{flex:1;min-width:140px}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--accent)}
.filter-bar select option{background:var(--bg2)}
.entry-list{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px}
.erow{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s;font-size:14px}
.erow:last-child{border-bottom:none}
.erow:hover{background:var(--bg3)}
.einfo{flex:1;min-width:0}
.ename{font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.emeta{font-size:12px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0;white-space:nowrap}
.b-active{background:#dcfce7;color:#15803d}
.b-hold{background:#fef9c3;color:#a16207}
.b-complete{background:#ede9fe;color:#6d28d9}
.b-dev{background:#e0f2fe;color:#0369a1}
.b-pilot{background:#ffedd5;color:#c2410c}
.b-open{background:#f1f5f9;color:#475569}
.b-high{background:#fee2e2;color:#b91c1c}
.b-med{background:#fef9c3;color:#a16207}
.b-low{background:#f1f5f9;color:#64748b}
.b-done{background:#dcfce7;color:#15803d}
.b-inprog{background:#e0f2fe;color:#0369a1}
.pbar-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pbar{height:4px;background:var(--bg4);border-radius:4px;width:60px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .3s}
.pct{font-size:11px;color:var(--text3);min-width:30px;text-align:right}
.due-tag{font-size:11px;color:var(--text3);flex-shrink:0}
.due-tag.overdue{color:var(--danger)}
.row-actions{display:flex;gap:2px;flex-shrink:0}
.icon-action{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:6px;font-size:14px;transition:all .15s;font-family:var(--font)}
.icon-action:hover{background:var(--bg4);color:var(--text)}
.icon-action.danger:hover{background:rgba(248,113,113,.15);color:var(--danger)}
.icon-action.accent:hover{background:rgba(56,189,248,.15);color:var(--accent)}
.empty-row{padding:24px 16px;text-align:center;color:var(--text3);font-size:14px;font-style:italic}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.panel-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field-grid.three{grid-template-columns:1fr 1fr 1fr}
.field-grid.one{grid-template-columns:1fr}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-group label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.field-group input,.field-group select,.field-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--font);width:100%}
.field-group input:focus,.field-group select:focus,.field-group textarea:focus{outline:none;border-color:var(--accent)}
.field-group select option{background:var(--bg2)}
.field-group textarea{resize:vertical;height:72px}
.progress-row{display:flex;align-items:center;gap:10px}
.progress-row input[type=range]{flex:1;accent-color:var(--accent)}
.progress-row span{font-size:13px;color:var(--text2);min-width:36px;text-align:right}
.panel-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg3);color:var(--text)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#ffffff;font-weight:600}
.btn.primary:hover{background:var(--accent2)}
.btn.danger{border-color:rgba(248,113,113,.3);color:var(--danger)}
.btn.danger:hover{background:rgba(248,113,113,.1)}
.btn.sm{padding:5px 10px;font-size:12px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:600}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;min-height:38px;cursor:text;position:relative}
.tags-wrap:focus-within{border-color:var(--accent)}
.tag-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg4);border-radius:20px;padding:2px 8px;font-size:12px;color:var(--text2)}
.tag-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:0;line-height:1}
.tag-chip button:hover{color:var(--danger)}
.tags-input{border:none;background:transparent;color:var(--text);font-size:13px;font-family:var(--font);outline:none;min-width:100px;flex:1}
.tags-dropdown{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);margin-top:2px;max-height:160px;overflow-y:auto;display:none;z-index:10}
.tags-dropdown.open{display:block}
.tag-option{padding:7px 12px;font-size:13px;cursor:pointer;color:var(--text2)}
.tag-option:hover{background:var(--bg3);color:var(--text)}
.tag-option.add-new{color:var(--accent)}
.detail-page{display:none;flex:1;flex-direction:column;overflow:hidden}
.detail-page.active{display:flex}
.list-page{display:flex;flex:1;overflow:hidden}
.list-page.hidden{display:none}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);overflow-x:auto}
.detail-tab{padding:11px 18px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.detail-tab:hover{color:var(--text2)}
.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.detail-body{flex:1;overflow-y:auto}
.detail-inner{padding:20px;max-width:860px;margin:0 auto}
.detail-section{margin-bottom:28px}
.detail-section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--bg3)}
.task-check{margin-top:2px;cursor:pointer;accent-color:var(--accent);width:15px;height:15px;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-desc{font-weight:500;color:var(--text);margin-bottom:3px}
.task-desc.done{text-decoration:line-through;color:var(--text3)}
.task-meta{font-size:11px;color:var(--text3);display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.task-meta-item{display:flex;align-items:center;gap:3px}
.hist-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;flex-shrink:0;margin-top:6px}
.hist-dot.task{background:#16a34a}
.hist-dot.note{background:#0ea5e9}
.hist-content{flex:1}
.hist-text{font-size:13px;color:var(--text2)}
.hist-time{font-size:11px;color:var(--text3);margin-top:3px}
.file-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.file-row:last-child{border-bottom:none}
.file-row:hover{background:var(--bg3)}
.file-label{font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-desc{font-size:11px;color:var(--text3)}
.file-link{color:var(--accent);text-decoration:none;font-size:12px;flex-shrink:0}
.file-link:hover{text-decoration:underline}
.scope-area,.notes-area{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:14px;color:var(--text);font-family:var(--font);resize:vertical;line-height:1.6}
.scope-area:focus,.notes-area:focus{outline:none;border-color:var(--accent)}
.scope-area{min-height:160px}
.notes-area{min-height:200px}
.statusbar{padding:6px 20px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);flex-shrink:0}
.status-dot{width:6px;height:6px;border-radius:50%;background:#16a34a}
.status-dot.error{background:#dc2626}
.status-dot.loading{background:#d97706}
.tabbar{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;overflow-x:auto;gap:2px}
.tab-item{display:flex;flex-direction:column;align-items:center;padding:8px 10px;cursor:pointer;border-radius:var(--radius);flex-shrink:0;transition:all .15s;min-width:56px}
.tab-item:hover{background:var(--bg3)}
.tab-item.active .ti,.tab-item.active .tab-lbl{color:var(--accent)}
.tab-item .ti{font-size:20px;color:var(--text3);transition:color .15s}
.tab-lbl{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap}
#loading{position:fixed;inset:0;background:#f8fafc;display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.roster-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.roster-item:last-child{border-bottom:none}
.roster-name{flex:1;font-weight:500}
.roster-sub{font-size:12px;color:var(--text3)}
@media(max-width:640px){
  .sidebar{display:none}
  .tabbar{display:flex}
  .main-inner{padding:14px}
  .field-grid.three{grid-template-columns:1fr 1fr}
  .field-grid{grid-template-columns:1fr}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .topbar{padding:10px 14px}
  .detail-tab{padding:10px 12px;font-size:12px}
  .hdr-btn span{display:none}
.report-group{margin-bottom:22px}
.report-group-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.report-entry-title{font-size:12px;font-weight:600;color:var(--text2);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.05em}
.report-task-row{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:var(--radius);background:var(--bg3);margin-bottom:5px;font-size:13px}
.report-task-desc{flex:1;color:var(--text)}
.report-task-meta{font-size:11px;color:var(--text3);margin-top:3px}
.report-empty{color:var(--text3);font-size:13px;font-style:italic;padding:10px 0}
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span style="color:var(--text3);font-size:14px">Loading…</span></div>
<div id="app" style="display:none">
  <div class="topbar" id="topbar">
    <i class="ti ti-layout-dashboard" style="font-size:18px;color:var(--accent)" aria-hidden="true"></i>
    <span class="topbar-title">Work <span>Organizer</span></span>
    <button class="hdr-btn" onclick="openManage()"><i class="ti ti-settings"></i><span>Sections</span></button>
    <button class="hdr-btn" onclick="openRoster('people')"><i class="ti ti-users"></i><span>People</span></button>
    <button class="hdr-btn" onclick="openRoster('resources')"><i class="ti ti-tool"></i><span>Resources</span></button>
    <button class="hdr-btn" onclick="openReport()"><i class="ti ti-report"></i><span>Reports</span></button>
    <button class="hdr-btn primary" onclick="openAddEntry()"><i class="ti ti-plus"></i><span>Add entry</span></button>
  </div>
  <div class="body">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main" id="main-scroll">
      <div class="list-page" id="list-page">
        <div class="main-inner" id="main-inner"></div>
      </div>
      <div class="detail-page" id="detail-page">
        <div class="detail-tabs" id="detail-tabs">
          <div class="detail-tab active" onclick="switchDetailTab('overview')">Overview</div>
          <div class="detail-tab" onclick="switchDetailTab('tasks')">Tasks</div>
          <div class="detail-tab" onclick="switchDetailTab('history')">History</div>
          <div class="detail-tab" onclick="switchDetailTab('notes')">Notes</div>
          <div class="detail-tab" onclick="switchDetailTab('files')">Files</div>
        </div>
        <div class="detail-body"><div class="detail-inner" id="detail-inner"></div></div>
      </div>
    </div>
  </div>
  <div class="tabbar" id="tabbar"></div>
  <div class="statusbar"><div class="status-dot" id="status-dot"></div><span id="status-text">Ready</span></div>
</div>

<!-- Edit entry modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit entry</span><button class="icon-action" onclick="closeModal('edit-modal')">✕</button></div>
    <div class="field-grid one"><div class="field-group"><label>Name *</label><input id="em-name"></div></div>
    <div class="field-grid" style="margin-top:8px"><div class="field-group"><label>Secondary field</label><input id="em-sub"></div><div class="field-group"><label>Status</label><select id="em-status"></select></div></div>
    <div class="field-grid" style="margin-top:8px"><div class="field-group"><label>Priority</label><select id="em-priority"><option value="">None</option><option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select></div><div class="field-group"><label>Due date</label><input id="em-due" type="date"></div></div>
    <div class="field-grid one" style="margin-top:8px"><div class="field-group"><label>Notes</label><textarea id="em-note"></textarea></div></div>
    <div id="em-progress-wrap" style="display:none;margin-top:8px"><div class="field-group"><label>Progress</label><div class="progress-row"><input type="range" min="0" max="100" step="1" id="em-progress" oninput="document.getElementById('em-pct').textContent=this.value+'%'"><span id="em-pct">0%</span></div></div></div>
    <div class="panel-actions"><button class="btn danger" onclick="deleteCurrentEdit()"><i class="ti ti-trash"></i> Delete</button><button class="btn" onclick="closeModal('edit-modal')">Cancel</button><button class="btn primary" onclick="saveEdit()">Save</button></div>
  </div>
</div>

<!-- Manage sections modal -->
<div class="modal-overlay" id="manage-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Manage sections</span><button class="icon-action" onclick="closeModal('manage-modal')">✕</button></div>
    <div id="manage-list"></div>
    <div style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Add new section</div>
      <div class="field-grid" style="margin-bottom:8px"><div class="field-group"><label>Name *</label><input id="ns-name" placeholder="e.g. Partnerships"></div><div class="field-group"><label>Icon (Tabler name)</label><input id="ns-icon" placeholder="e.g. ti-star"></div></div>
      <div class="field-grid three" style="margin-bottom:8px">
        <div class="field-group"><label>Color</label><select id="ns-color"><option value="#38bdf8">Blue</option><option value="#2dd4bf">Teal</option><option value="#a78bfa">Purple</option><option value="#fbbf24">Amber</option><option value="#fb923c">Coral</option><option value="#34d399">Green</option><option value="#f472b6">Pink</option><option value="#94a3b8">Gray</option></select></div>
        <div class="field-group"><label>Progress slider</label><select id="ns-progress"><option value="0">No</option><option value="1">Yes</option></select></div>

<script>
/* ── Neon config ─────────────────────────────────── */
const NEON_HOST='ep-square-rain-adx9em6r-pooler.c-2.us-east-1.aws.neon.tech';
const NEON_DB='neondb';
const NEON_USER='neondb_owner';
const NEON_PASS='npg_7Fzv3JtlPOpk';
const NEON_URL=`https://${NEON_HOST}/sql`;
const NEON_AUTH='Basic '+btoa(`${NEON_USER}:${NEON_PASS}`);

async function sql(query,params=[]){
  const r=await fetch(NEON_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':NEON_AUTH,'Neon-Connection-String':`postgresql://${NEON_USER}:${NEON_PASS}@${NEON_HOST}/${NEON_DB}?sslmode=require`},
    body:JSON.stringify({query,params})
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const j=await r.json();
  return j.rows||[];
}

// Helper: insert a row and return it
async function sqlInsert(table,obj){
  const keys=Object.keys(obj);
  const vals=Object.values(obj);
  const placeholders=vals.map((_,i)=>`$${i+1}`).join(',');
  const rows=await sql(
    `insert into ${table} (${keys.join(',')}) values (${placeholders}) returning *`,
    vals
  );
  return rows[0]||null;
}

// Helper: update a row
async function sqlUpdate(table,patch,idCol,idVal){
  const keys=Object.keys(patch);
  const vals=Object.values(patch);
  const sets=keys.map((k,i)=>`${k}=$${i+1}`).join(',');
  await sql(`update ${table} set ${sets} where ${idCol}=$${keys.length+1}`,[...vals,idVal]);
}

// Helper: delete a row
async function sqlDelete(table,idCol,idVal){
  await sql(`delete from ${table} where ${idCol}=$1`,[idVal]);
}

let sections=[],items={},tasks={},history={},files={},people=[],resources=[];
let activeId=null,detailItemId=null,detailTab='overview';
let editTarget=null,filterStatus='',filterSearch='',addOpen=false;
let taskEditId=null,currentRosterType=null;
let tmPeopleTags=[],tmResTags=[];

const STATUS_OPTS=[{v:'active',l:'Active'},{v:'hold',l:'On hold'},{v:'complete',l:'Complete'},{v:'dev',l:'In development'},{v:'pilot',l:'Pilot'},{v:'open',l:'Open / needed'}];
const BADGES={active:'b-active',hold:'b-hold',complete:'b-complete',dev:'b-dev',pilot:'b-pilot',open:'b-open'};
const PBADGES={high:'b-high',med:'b-med',low:'b-low'};
const TBADGES={open:'b-open',inprog:'b-inprog',done:'b-done'};
const TLABELS={open:'Open',inprog:'In progress',done:'Done'};

async function init(){
  await loadAll();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  renderAll();
}

async function loadAll(){
  setStatus('loading','Loading…');
  try{
    const[secs,ppl,res]=await Promise.all([
      sql('select * from sections order by sort_order'),
      sql('select * from people order by name'),
      sql('select * from resources order by name'),
    ]);
    sections=secs||[];people=ppl||[];resources=res||[];
    if(!sections.length){await seedSections();return;}
    activeId=sections[0]?.id||null;
    await loadSectionItems(activeId);
    setStatus('ok','Connected · Neon · '+new Date().toLocaleTimeString());
  }catch(e){setStatus('error','Load error: '+e.message);}
}

async function loadSectionItems(secId){
  if(!secId)return;
  const rows=await sql('select * from items where section_id=$1 order by sort_order',[secId]);
  items[secId]=rows||[];
}

async function loadItemDetail(itemId){
  const[t,h,f]=await Promise.all([
    sql('select * from tasks where item_id=$1 order by sort_order',[itemId]),
    sql('select * from history where item_id=$1 order by created_at desc',[itemId]),
    sql('select * from files where item_id=$1 order by created_at',[itemId]),
  ]);
  tasks[itemId]=t||[];history[itemId]=h||[];files[itemId]=f||[];
}

async function seedSections(){
  const defs=[
    {name:'Customer projects',icon:'ti-briefcase',color:'#38bdf8',progress:false,sort_order:0},
    {name:'Technology',icon:'ti-cpu',color:'#a78bfa',progress:true,sort_order:1},
    {name:'Product scale-up',icon:'ti-arrow-up-right',color:'#2dd4bf',progress:true,sort_order:2},
    {name:'Resources',icon:'ti-building',color:'#fbbf24',progress:false,sort_order:3},
  ];
  for(const d of defs){
    const row=await sqlInsert('sections',d);
    if(row){sections.push(row);items[row.id]=[];}
  }
  activeId=sections[0]?.id||null;
}

function setStatus(state,msg){
  const dot=document.getElementById('status-dot');const txt=document.getElementById('status-text');
  dot.className='status-dot'+(state==='error'?' error':state==='loading'?' loading':'');
  txt.textContent=msg;
}

function renderAll(){renderNav();renderMain();}

function renderNav(){
  const sidebar=document.getElementById('sidebar');const tabbar=document.getElementById('tabbar');
  sidebar.innerHTML=`<div class="sidebar-label">Sections</div>`+
    sections.map(s=>{
      const cnt=(items[s.id]||[]).length;const active=s.id===activeId;
      return`<div class="sb-item${active?' active':''}" onclick="switchSection('${s.id}')">
        <span style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
        <i class="ti ${s.icon}" aria-hidden="true"></i>
        <span class="sb-item-name">${s.name}</span>
        <span class="sb-count">${cnt}</span>
      </div>`;
    }).join('')+`<button class="sb-add-btn" onclick="openManage()"><i class="ti ti-plus"></i> New section</button>`;
  tabbar.innerHTML=sections.map(s=>{
    const active=s.id===activeId;
    return`<div class="tab-item${active?' active':''}" onclick="switchSection('${s.id}')">
      <i class="ti ${s.icon}" aria-hidden="true"></i>
      <span class="tab-lbl">${s.name.split(' ')[0]}</span>
    </div>`;
  }).join('');
}

function renderMain(){
  const el=document.getElementById('main-inner');
  const sec=sections.find(s=>s.id===activeId);
  if(!sec){el.innerHTML='<div class="empty-row">No sections yet.</div>';return;}
  const all=items[sec.id]||[];
  const filtered=all.filter(e=>{
    if(filterStatus&&e.status!==filterStatus)return false;
    if(filterSearch){const q=filterSearch.toLowerCase();return e.name.toLowerCase().includes(q)||(e.sub||'').toLowerCase().includes(q);}
    return true;
  });
  const total=all.length,active=all.filter(e=>e.status==='active').length;
  const done=all.filter(e=>e.status==='complete'||e.status==='pilot').length;
  const hold=all.filter(e=>e.status==='hold').length;
  const today=new Date().toISOString().split('T')[0];
  const rows=filtered.length?filtered.map(e=>{
    const bc=BADGES[e.status]||'b-hold';const sl=STATUS_OPTS.find(o=>o.v===e.status)?.l||e.status;
    const pb=e.priority?`<span class="badge ${PBADGES[e.priority]||''}">${e.priority}</span>`:'';
    const dueHtml=e.due_date?`<span class="due-tag${e.due_date<today?' overdue':''}"><i class="ti ti-calendar" style="font-size:12px" aria-hidden="true"></i> ${e.due_date}</span>`:'';
    const prog=sec.progress?`<div class="pbar-wrap"><div class="pbar"><div class="pfill" style="width:${e.progress||0}%;background:${sec.color}"></div></div><span class="pct">${e.progress||0}%</span></div>`:'';
    return`<div class="erow">
      <div class="einfo"><div class="ename">${e.name}</div>${e.sub?`<div class="emeta">${e.sub}</div>`:''}</div>
      ${dueHtml}${prog}${pb}
      <span class="badge ${bc}">${sl}</span>
      <div class="row-actions">
        <button class="icon-action accent" onclick="openDetail('${e.id}')" title="Open detail"><i class="ti ti-layout-sidebar-right"></i></button>
        <button class="icon-action" onclick="openEdit('${sec.id}','${e.id}')" title="Edit"><i class="ti ti-edit"></i></button>
        <button class="icon-action danger" onclick="confirmDelete('${sec.id}','${e.id}')" title="Delete"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join(''):`<div class="empty-row">${filterStatus||filterSearch?'No matching entries.':'No entries yet — use Add entry to get started.'}</div>`;
  el.innerHTML=
    (addOpen?renderAddPanel(sec):'')+
    `<div class="sec-header"><span class="sec-dot" style="background:${sec.color}"></span><span class="sec-name">${sec.name}</span></div>
    <div class="metrics">
      <div class="metric"><div class="metric-lbl">Total</div><div class="metric-val">${total}</div></div>
      <div class="metric"><div class="metric-lbl">Active</div><div class="metric-val">${active}</div></div>
      <div class="metric"><div class="metric-lbl">Done / pilot</div><div class="metric-val">${done}</div></div>
      <div class="metric"><div class="metric-lbl">On hold</div><div class="metric-val">${hold}</div></div>
    </div>
    <div class="filter-bar">
      <input placeholder="Search entries…" oninput="setSearch(this.value)" value="${filterSearch}">
      <select onchange="setFilter(this.value)">
        <option value="">All statuses</option>
        ${STATUS_OPTS.map(o=>`<option value="${o.v}"${filterStatus===o.v?' selected':''}>${o.l}</option>`).join('')}
      </select>
    </div>
    <div class="entry-list">${rows}</div>`;
}

function renderAddPanel(sec){
  const opts=STATUS_OPTS.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
  return`<div class="panel">
    <div class="panel-title"><i class="ti ti-plus" aria-hidden="true"></i> New entry in ${sec.name}</div>
    <div class="field-grid"><div class="field-group"><label>Name *</label><input id="a-name" placeholder="Entry name"></div><div class="field-group"><label>Secondary field</label><input id="a-sub" placeholder="Customer, owner, phase…"></div></div>
    <div class="field-grid three" style="margin-top:8px">
      <div class="field-group"><label>Status</label><select id="a-status">${opts}</select></div>
      <div class="field-group"><label>Priority</label><select id="a-priority"><option value="">None</option><option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select></div>
      <div class="field-group"><label>Due date</label><input id="a-due" type="date"></div>
    </div>
    <div class="field-grid one" style="margin-top:8px"><div class="field-group"><label>Notes</label><textarea id="a-note" placeholder="Context, links, actions…"></textarea></div></div>
    ${sec.progress?`<div style="margin-top:8px"><div class="field-group"><label>Progress</label><div class="progress-row"><input type="range" min="0" max="100" step="1" id="a-progress" value="0" oninput="document.getElementById('a-pct').textContent=this.value+'%'"><span id="a-pct">0%</span></div></div></div>`:''}

  </div>`;
}

function renderTasks(item){
  const taskList=tasks[item.id]||[];
  const today=new Date().toISOString().split('T')[0];
  const rows=taskList.length?taskList.map(t=>{
    const bc=TBADGES[t.status]||'b-open';const lbl=TLABELS[t.status]||t.status;

    const res=t.resources_text?(t.resources_text.split(',').filter(Boolean).map(r=>`<span class="tag-chip" style="margin:0">${r.trim()}</span>`).join('')):'';
    const overdue=t.due_date&&t.due_date<today&&t.status!=='done';
    return`<div class="task-row">
      <input type="checkbox" class="task-check" ${t.status==='done'?'checked':''} onchange="toggleTask('${t.id}',this.checked)">
      <div class="task-info">

function onTagInput(el,type){

    html+=`<div class="tag-option add-new" onclick="selectTag('${type}','${el.value.trim().replace(/'/g,"\\'")}',true)"><i class="ti ti-plus" aria-hidden="true"></i> Add "${el.value.trim()}"</div>`;

async function selectTag(type,val,isNew){
  if(!val.trim())return;
  if(type==='people'){if(!tmPeopleTags.includes(val))tmPeopleTags.push(val);}
  else{if(!tmResTags.includes(val))tmResTags.push(val);}
  if(isNew){
    const table=type==='people'?'people':'resources';
    const field=type==='people'?{name:val,role:''}:{name:val,category:''};
    const data=await sqlInsert(table,field);
    if(data){if(type==='people')people.push(data);else resources.push(data);}
  }
  document.getElementById(type==='people'?'tm-people-dropdown':'tm-res-dropdown')?.classList.remove('open');
  renderTagsWrap(type==='people'?'tm-people-wrap':'tm-res-wrap',type==='people'?tmPeopleTags:tmResTags,type);

let reportData=[];

function openReport(){
  updateRptSelect();
  document.getElementById('report-output').innerHTML='<div class="report-empty">Select options above and click Generate.</div>';
  openModal('report-modal');
}

function updateRptSelect(){

  const list=type==='person'?people:resources;
  document.getElementById('rpt-target').innerHTML=list.length
    ?list.map(p=>`<option value="${p.name}">${p.name}${p.role||p.category?' ('+( p.role||p.category)+')':''}</option>`).join('')
    :`<option value="">No ${type==='person'?'people':'resources'} in roster</option>`;

async function runReport(){
  const type=document.getElementById('rpt-type').value;
  const target=document.getElementById('rpt-target').value;
  const statusFilter=document.getElementById('rpt-status').value;
  if(!target){document.getElementById('report-output').innerHTML='<div class="report-empty">No selection available.</div>';return;}

  document.getElementById('report-output').innerHTML='<div class="report-empty">Loading…</div>';

  // Load all tasks across all sections fresh from DB
  const allItems=[];
  for(const sec of sections){
    const its=items[sec.id]||[];
    its.forEach(it=>allItems.push({...it,sectionName:sec.name,sectionColor:sec.color}));
  }

  // Also load tasks for items not yet cached
  const uncachedItemIds=allItems.map(i=>i.id).filter(id=>!tasks[id]);
  if(uncachedItemIds.length){
    const placeholders=uncachedItemIds.map((_,i)=>`$${i+1}`).join(',');
    const newTasks=await sql(`select * from tasks where item_id in (${placeholders})`,uncachedItemIds);
    if(newTasks){
      newTasks.forEach(t=>{
        (tasks[t.item_id]=tasks[t.item_id]||[]).push(t);
      });
    }
  }

  // Build report: group by section → entry → tasks assigned to target
  reportData=[];
  const field=type==='person'?'people_text':'resources_text';
  const today=new Date().toISOString().split('T')[0];
  const statusMatch=(s)=>{
    if(!statusFilter)return true;
    if(statusFilter==='open_active')return s==='open'||s==='inprog';
    return s===statusFilter;
  };

  for(const sec of sections){
    const secItems=items[sec.id]||[];
    const secGroup={sectionName:sec.name,sectionColor:sec.color,entries:[]};
    for(const it of secItems){
      const itTasks=(tasks[it.id]||[]).filter(t=>{
        const inTarget=(t[field]||'').split(',').map(s=>s.trim()).includes(target);
        const statusOk=statusMatch(t.status);
        return inTarget&&statusOk;
      });
      if(itTasks.length){
        secGroup.entries.push({itemName:it.name,tasks:itTasks});
      }
    }
    if(secGroup.entries.length)reportData.push(secGroup);
  }

  renderReportOutput(target,type,statusFilter,today);
}

function renderReportOutput(target,type,statusFilter,today){
  const el=document.getElementById('report-output');
  if(!reportData.length){
    el.innerHTML=`<div class="report-empty">No tasks found for <strong>${target}</strong>${statusFilter?' with status "'+TLABELS[statusFilter]+'"':''}.</div>`;
    return;
  }
  el.innerHTML=reportData.map(sg=>`
    <div class="report-group">
      <div class="report-group-title">
        <span style="width:8px;height:8px;border-radius:50%;background:${sg.sectionColor};display:inline-block;flex-shrink:0"></span>
        ${sg.sectionName}
      </div>
      ${sg.entries.map(en=>`
        <div class="report-entry-title"><i class="ti ti-folder" aria-hidden="true"></i> ${en.itemName}</div>
        ${en.tasks.map(t=>{
          const overdue=t.due_date&&t.due_date<today&&t.status!=='done';
          const bc=TBADGES[t.status]||'b-open';const lbl=TLABELS[t.status]||t.status;
          return`<div class="report-task-row">
            <div style="flex:1">
              <div class="report-task-desc">${t.description}</div>
              <div class="report-task-meta">
                ${t.due_date?`<span style="${overdue?'color:var(--danger)':''}"><i class="ti ti-calendar" aria-hidden="true"></i> ${t.due_date}${overdue?' ⚠ overdue':''}</span> `:''}
                ${t.people_text?`<span><i class="ti ti-user" aria-hidden="true"></i> ${t.people_text}</span> `:''}
                ${t.resources_text?`<span><i class="ti ti-tool" aria-hidden="true"></i> ${t.resources_text}</span>`:''}
              </div>
            </div>
            <span class="badge ${bc}">${lbl}</span>
          </div>`;
        }).join('')}
      `).join('')}
    </div>`).join('');
}

function getStatusLabel(sf){
  if(!sf)return'All tasks';
  if(sf==='open_active')return'Open & in progress';
  return TLABELS[sf]||sf;
}

function buildPrintHTML(target,type,statusFilter){
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const typeLabel=type==='person'?'Person':'Resource';
  const rows=reportData.map(sg=>`
    <div class="group">
      <div class="group-title">${sg.sectionName}</div>
      ${sg.entries.map(en=>`
        <div class="entry-title">${en.itemName}</div>
        <table>
          <thead><tr><th>Task</th><th>Status</th><th>Due</th><th>People</th><th>Resources</th></tr></thead>
          <tbody>
            ${en.tasks.map(t=>`<tr>
              <td>${t.description}</td>
              <td>${TLABELS[t.status]||t.status}</td>
              <td>${t.due_date||'—'}</td>
              <td>${t.people_text||'—'}</td>
              <td>${t.resources_text||'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      `).join('')}
    </div>`).join('');
  return`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
  <title>Task Report — ${target}</title>
  <style>
    body{font-family:-apple-system,'Segoe UI',sans-serif;font-size:13px;color:#1e293b;margin:0;padding:32px 40px}
    h1{font-size:20px;font-weight:700;margin-bottom:4px;color:#0f172a}
    .meta{font-size:12px;color:#64748b;margin-bottom:28px}
    .group{margin-bottom:28px;page-break-inside:avoid}
    .group-title{font-size:14px;font-weight:700;color:#0ea5e9;border-bottom:2px solid #e2e8f0;padding-bottom:6px;margin-bottom:10px}
    .entry-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#475569;margin:12px 0 6px}
    table{width:100%;border-collapse:collapse;margin-bottom:12px}
    th{background:#f1f5f9;text-align:left;padding:6px 10px;font-size:11px;font-weight:600;text-transform:uppercase;color:#64748b;border:1px solid #e2e8f0}
    td{padding:6px 10px;border:1px solid #e2e8f0;vertical-align:top;font-size:12px}
    tr:nth-child(even) td{background:#f8fafc}
    .footer{margin-top:32px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:10px}
    @media print{body{padding:16px 20px}.group{page-break-inside:avoid}}
  </style></head><body>
  <h1>Task Report — ${target}</h1>
  <div class="meta">${typeLabel}: <strong>${target}</strong> &nbsp;·&nbsp; Status: <strong>${getStatusLabel(statusFilter)}</strong> &nbsp;·&nbsp; Generated: ${date}</div>
  ${rows.length?rows:'<p style="color:#94a3b8;font-style:italic">No tasks found.</p>'}
  <div class="footer">Work Organizer · Exported ${date}</div>
  </body></html>`;
}

function printReport(){
  const target=document.getElementById('rpt-target').value;
  const type=document.getElementById('rpt-type').value;
  const statusFilter=document.getElementById('rpt-status').value;
  if(!reportData.length){alert('Generate the report first.');return;}
  const html=buildPrintHTML(target,type,statusFilter);
  const win=window.open('','_blank');
  win.document.write(html);win.document.close();
  win.onload=()=>{win.focus();win.print();};
}

async function downloadDocx(){
  const target=document.getElementById('rpt-target').value;
  const type=document.getElementById('rpt-type').value;
  const statusFilter=document.getElementById('rpt-status').value;
  if(!reportData.length){alert('Generate the report first.');return;}

  // Load docx library on demand
  if(!window.docx){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
  }

  const {Document,Packer,Paragraph,Table,TableRow,TableCell,TextRun,HeadingLevel,
         AlignmentType,BorderStyle,WidthType,ShadingType}=window.docx;

  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const typeLabel=type==='person'?'Person':'Resource';
  const children=[];

  // Title
  children.push(new Paragraph({
    text:`Task Report — ${target}`,
    heading:HeadingLevel.HEADING_1,
    spacing:{after:120}
  }));

  // Subtitle line
  children.push(new Paragraph({
    children:[
      new TextRun({text:`${typeLabel}: `,color:'666666',size:20}),
      new TextRun({text:target,bold:true,size:20}),
      new TextRun({text:`   |   Status: `,color:'666666',size:20}),
      new TextRun({text:getStatusLabel(statusFilter),bold:true,size:20}),
      new TextRun({text:`   |   Generated: ${date}`,color:'666666',size:20}),
    ],
    spacing:{after:320}
  }));

  const cellBorder={style:BorderStyle.SINGLE,size:4,color:'CBD5E1'};
  const allBorders={top:cellBorder,bottom:cellBorder,left:cellBorder,right:cellBorder};
  const colWidths=[3600,1200,1100,1500,1500]; // twips, total ~8900

  for(const sg of reportData){
    // Section heading
    children.push(new Paragraph({
      children:[new TextRun({text:sg.sectionName,bold:true,color:'0EA5E9',size:26})],
      spacing:{before:280,after:100},
      border:{bottom:{style:BorderStyle.SINGLE,size:6,color:'0EA5E9'}}
    }));

    for(const en of sg.entries){
      // Entry/project sub-heading
      children.push(new Paragraph({
        children:[new TextRun({text:en.itemName,bold:true,size:22,color:'334155'})],
        spacing:{before:200,after:80}
      }));

      // Table header row
      const headerRow=new TableRow({
        tableHeader:true,
        children:[
          ['Task','Status','Due Date','People','Resources'].map((h,i)=>
            new TableCell({
              width:{size:colWidths[i],type:WidthType.DXA},
              shading:{type:ShadingType.SOLID,color:'F1F5F9'},
              borders:allBorders,
              children:[new Paragraph({children:[new TextRun({text:h,bold:true,size:18,color:'64748B'})]})]
            })
          )
        ].flat()
      });

      // Data rows
      const dataRows=en.tasks.map((t,idx)=>new TableRow({
        children:[
          new TableCell({width:{size:colWidths[0],type:WidthType.DXA},borders:allBorders,
            shading:idx%2===1?{type:ShadingType.SOLID,color:'F8FAFC'}:{},
            children:[new Paragraph({children:[new TextRun({text:t.description,size:18})]})]
          }),
          new TableCell({width:{size:colWidths[1],type:WidthType.DXA},borders:allBorders,
            shading:idx%2===1?{type:ShadingType.SOLID,color:'F8FAFC'}:{},
            children:[new Paragraph({children:[new TextRun({text:TLABELS[t.status]||t.status,size:18})]})]
          }),
          new TableCell({width:{size:colWidths[2],type:WidthType.DXA},borders:allBorders,
            shading:idx%2===1?{type:ShadingType.SOLID,color:'F8FAFC'}:{},
            children:[new Paragraph({children:[new TextRun({text:t.due_date||'—',size:18,color:t.due_date&&t.due_date<new Date().toISOString().split('T')[0]&&t.status!=='done'?'EF4444':'000000'})]})]
          }),
          new TableCell({width:{size:colWidths[3],type:WidthType.DXA},borders:allBorders,
            shading:idx%2===1?{type:ShadingType.SOLID,color:'F8FAFC'}:{},
            children:[new Paragraph({children:[new TextRun({text:t.people_text||'—',size:18})]})]
          }),
          new TableCell({width:{size:colWidths[4],type:WidthType.DXA},borders:allBorders,
            shading:idx%2===1?{type:ShadingType.SOLID,color:'F8FAFC'}:{},
            children:[new Paragraph({children:[new TextRun({text:t.resources_text||'—',size:18})]})]
          }),
        ]
      }));

      children.push(new Table({rows:[headerRow,...dataRows],width:{size:8900,type:WidthType.DXA}}));
      children.push(new Paragraph({text:'',spacing:{after:160}}));
    }
  }

  if(!reportData.length){
    children.push(new Paragraph({children:[new TextRun({text:'No tasks found.',color:'94A3B8',italics:true,size:20})]}));
  }

  // Footer
  children.push(new Paragraph({
    children:[new TextRun({text:`Work Organizer · Exported ${date}`,color:'94A3B8',size:16})],
    spacing:{before:400},
    border:{top:{style:BorderStyle.SINGLE,size:4,color:'E2E8F0'}}
  }));

  const doc=new Document({sections:[{properties:{},children}]});
  const blob=await Packer.toBlob(doc);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`task-report-${target.toLowerCase().replace(/\s+/g,'-')}-${new Date().toISOString().split('T')[0]}.docx`;
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus('ok','Word file downloaded');
}

init();
</script>
</body>
</html>

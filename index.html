<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Work Organizer">
<meta name="theme-color" content="#0f172a">
<title>Work Organizer</title>
<script>
const manifestData={name:"Work Organizer",short_name:"Organizer",start_url:"./",display:"standalone",background_color:"#0f172a",theme_color:"#0f172a",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text y='.9em' font-size='80' x='10'>📋</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifestData)],{type:'application/json'});
const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#273548;--bg4:#334155;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#38bdf8;--accent2:#0ea5e9;
  --success:#34d399;--warning:#fbbf24;--danger:#f87171;
  --purple:#a78bfa;--teal:#2dd4bf;--coral:#fb923c;
  --radius:10px;--radius-lg:14px;
  --sidebar-w:210px;--panel-w:420px;--tabbar-h:64px;
  --font:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
#app{display:flex;flex-direction:column;height:100%;}

/* Topbar */
.topbar{display:flex;align-items:center;gap:8px;padding:12px 18px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.topbar-title{font-size:15px;font-weight:600;flex:1;letter-spacing:-.01em;}
.topbar-title span{color:var(--accent);}
.hdr-btn{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px;font-family:var(--font);transition:all .15s;}
.hdr-btn:hover{background:var(--bg3);color:var(--text);}
.hdr-btn.primary{background:var(--accent);border-color:var(--accent);color:#0f172a;font-weight:600;}
.hdr-btn.primary:hover{background:var(--accent2);}

/* Body layout */
.body{display:flex;flex:1;overflow:hidden;}

/* Left sidebar */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:10px 0 20px;}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:12px 16px 6px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;font-size:13px;color:var(--text2);transition:all .15s;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--accent);}
.sb-item .ti{font-size:15px;}
.sb-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-count{font-size:11px;background:var(--bg4);border-radius:20px;padding:1px 7px;color:var(--text3);}
.sb-add-btn{margin:10px 12px 0;padding:7px 12px;border:1px dashed var(--border2);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:12px;color:var(--text3);text-align:left;width:calc(100% - 24px);font-family:var(--font);transition:all .15s;}
.sb-add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Main + panel container */
.main-panel-wrap{flex:1;display:flex;overflow:hidden;}

/* Main list area */
.main{flex:1;overflow-y:auto;min-width:0;}
.main-inner{padding:18px 20px;max-width:820px;width:100%;margin:0 auto;}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:18px;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
.metric-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.metric-val{font-size:22px;font-weight:700;}

/* Section header */
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sec-name{font-size:17px;font-weight:600;flex:1;}

/* Filter */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-bar input,.filter-bar select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px;color:var(--text);font-family:var(--font);}
.filter-bar input{flex:1;min-width:120px;}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--accent);}
.filter-bar select option{background:var(--bg2);}

/* Entry list */
.entry-list{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px;}
.erow{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;transition:background .1s;cursor:default;}
.erow:last-child{border-bottom:none;}
.erow:hover{background:var(--bg3);}
.einfo{flex:1;min-width:0;}
.ename{font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.emeta{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badge{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;flex-shrink:0;white-space:nowrap;}
.b-active{background:rgba(52,211,153,.15);color:#34d399;}
.b-hold{background:rgba(251,191,36,.15);color:#fbbf24;}
.b-complete{background:rgba(167,139,250,.15);color:#a78bfa;}
.b-dev{background:rgba(56,189,248,.15);color:#38bdf8;}
.b-pilot{background:rgba(251,146,60,.15);color:#fb923c;}
.b-open{background:rgba(148,163,184,.15);color:#94a3b8;}
.b-high{background:rgba(248,113,113,.15);color:#f87171;}
.b-med{background:rgba(251,191,36,.15);color:#fbbf24;}
.b-low{background:rgba(148,163,184,.15);color:#94a3b8;}
.b-task-open{background:rgba(56,189,248,.12);color:#38bdf8;}
.b-task-progress{background:rgba(251,191,36,.12);color:#fbbf24;}
.b-task-done{background:rgba(52,211,153,.12);color:#34d399;}
.b-task-blocked{background:rgba(248,113,113,.12);color:#f87171;}
.pbar-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.pbar{height:4px;background:var(--bg4);border-radius:4px;width:50px;overflow:hidden;}
.pfill{height:100%;border-radius:4px;}
.pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right;}
.due-tag{font-size:11px;color:var(--text3);flex-shrink:0;}
.due-tag.overdue{color:var(--danger);}
.row-actions{display:flex;gap:2px;flex-shrink:0;}
.icon-action{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:6px;font-size:14px;transition:all .15s;font-family:var(--font);}
.icon-action:hover{background:var(--bg4);color:var(--text);}
.icon-action.danger:hover{background:rgba(248,113,113,.15);color:var(--danger);}
.icon-action.accent{color:var(--accent);}
.empty-row{padding:22px 16px;text-align:center;color:var(--text3);font-size:13px;font-style:italic;}

/* ── Detail side panel ── */
.detail-panel{
  width:var(--panel-w);flex-shrink:0;
  background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .2s ease;
}
.detail-panel.closed{width:0;border-left:none;}
.panel-inner{width:var(--panel-w);display:flex;flex-direction:column;height:100%;overflow:hidden;}
.panel-topbar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.ptab{padding:9px 14px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.ptab:hover{color:var(--text2);}
.ptab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel-body{flex:1;overflow-y:auto;padding:16px;}

/* Panel sections */
.p-section{margin-bottom:20px;}
.p-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;}
.p-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:13px;color:var(--text);font-family:var(--font);resize:vertical;min-height:100px;line-height:1.6;}
.p-textarea:focus{outline:none;border-color:var(--accent);}
.p-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--font);}
.p-input:focus{outline:none;border-color:var(--accent);}
.p-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--font);}
.p-select:focus{outline:none;border-color:var(--accent);}
.p-select option{background:var(--bg2);}
.save-btn{padding:7px 16px;border-radius:var(--radius);border:none;background:var(--accent);color:#0f172a;font-weight:600;font-size:13px;cursor:pointer;font-family:var(--font);}
.save-btn:hover{background:var(--accent2);}
.small-btn{padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.small-btn:hover{background:var(--bg3);color:var(--text);}
.small-btn.success{border-color:rgba(52,211,153,.3);color:var(--success);}
.small-btn.success:hover{background:rgba(52,211,153,.1);}
.small-btn.danger{border-color:rgba(248,113,113,.3);color:var(--danger);}
.small-btn.danger:hover{background:rgba(248,113,113,.1);}

/* Task cards */
.task-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;}
.task-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.task-desc{flex:1;font-size:13px;font-weight:500;color:var(--text);}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.task-meta span{font-size:11px;color:var(--text3);}
.task-meta .ti{font-size:12px;vertical-align:-1px;}
.task-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* History entries */
.hist-entry{display:flex;gap:10px;margin-bottom:12px;}
.hist-line{display:flex;flex-direction:column;align-items:center;gap:0;}
.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
.hist-connector{width:1px;flex:1;background:var(--border2);margin:4px 0;}
.hist-content{flex:1;padding-bottom:4px;}
.hist-text{font-size:13px;color:var(--text2);line-height:1.5;}
.hist-time{font-size:11px;color:var(--text3);margin-top:3px;}

/* File links */
.file-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;}
.file-label{flex:1;min-width:0;}
.file-name{font-size:13px;font-weight:500;color:var(--accent);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-name:hover{text-decoration:underline;}
.file-desc{font-size:11px;color:var(--text3);margin-top:1px;}

/* Add forms inside panel */
.add-form{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px;}
.add-form-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.form-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.form-row input,.form-row select{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:6px 9px;font-size:12px;color:var(--text);font-family:var(--font);flex:1;min-width:0;}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--accent);}
.form-row select option{background:var(--bg2);}
.form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:8px;}

/* People chips */
.people-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.person-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);border-radius:20px;font-size:12px;color:var(--accent);}
.person-chip button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:12px;padding:0;line-height:1;}

/* Overview fields */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ov-field{display:flex;flex-direction:column;gap:4px;}
.ov-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.progress-row{display:flex;align-items:center;gap:8px;}
.progress-row input[type=range]{flex:1;accent-color:var(--accent);}
.progress-row span{font-size:12px;color:var(--text2);min-width:32px;text-align:right;}

/* Add panel (top of main) */
.add-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;}
.add-panel-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.field-grid.three{grid-template-columns:1fr 1fr 1fr;}
.field-grid.one{grid-template-columns:1fr;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-group label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.field-group input,.field-group select,.field-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--font);width:100%;}
.field-group input:focus,.field-group select:focus,.field-group textarea:focus{outline:none;border-color:var(--accent);}
.field-group select option{background:var(--bg2);}
.field-group textarea{resize:vertical;height:56px;}
.panel-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:var(--font);transition:all .15s;}
.btn:hover{background:var(--bg3);color:var(--text);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0f172a;font-weight:600;}
.btn.primary:hover{background:var(--accent2);}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:15px;font-weight:600;}
.modal label{font-size:11px;color:var(--text3);display:block;margin-bottom:3px;margin-top:10px;text-transform:uppercase;letter-spacing:.05em;}
.modal input,.modal select{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:var(--font);}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--accent);}
.modal select option{background:var(--bg2);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* Manage sections */
.sec-mgmt-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.sec-mgmt-item:last-child{border-bottom:none;}

/* Status bar */
.statusbar{padding:5px 18px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);flex-shrink:0;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);}
.status-dot.error{background:var(--danger);}
.status-dot.loading{background:var(--warning);}

/* Tab bar mobile */
.tabbar{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;overflow-x:auto;gap:2px;}
.tab-item{display:flex;flex-direction:column;align-items:center;padding:7px 10px;cursor:pointer;border-radius:var(--radius);flex-shrink:0;min-width:54px;}
.tab-item .ti{font-size:19px;color:var(--text3);}
.tab-lbl{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap;}
.tab-item.active .ti,.tab-item.active .tab-lbl{color:var(--accent);}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px;}
.spinner{width:30px;height:30px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Config banner */
.config-banner{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:var(--radius);padding:9px 13px;font-size:13px;color:var(--warning);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* Responsive */
@media(max-width:900px){
  :root{--panel-w:100vw;}
  .detail-panel{position:fixed;inset:0;z-index:50;border-left:none;}
  .detail-panel.closed{width:0;overflow:hidden;}
}
@media(max-width:640px){
  .sidebar{display:none;}
  .tabbar{display:flex;}
  .main-inner{padding:12px;}
  .field-grid.three{grid-template-columns:1fr 1fr;}
  .field-grid{grid-template-columns:1fr;}
  .metrics{grid-template-columns:repeat(2,1fr);}
  .ov-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span style="color:var(--text3);font-size:13px">Loading…</span></div>
<div id="app" style="display:none">
  <div class="topbar">
    <i class="ti ti-layout-dashboard" style="font-size:17px;color:var(--accent)" aria-hidden="true"></i>
    <span class="topbar-title">Work <span>Organizer</span></span>
    <button class="hdr-btn" onclick="openManage()"><i class="ti ti-settings"></i><span>Sections</span></button>
    <button class="hdr-btn" onclick="openPeople()"><i class="ti ti-users"></i><span>People</span></button>
    <button class="hdr-btn primary" onclick="openAddEntry()"><i class="ti ti-plus"></i><span>Add entry</span></button>
  </div>
  <div class="body">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-panel-wrap">
      <div class="main">
        <div class="main-inner" id="main-inner"></div>
      </div>
      <div class="detail-panel closed" id="detail-panel">
        <div class="panel-inner" id="panel-inner"></div>
      </div>
    </div>
  </div>
  <div class="tabbar" id="tabbar"></div>
  <div class="statusbar"><div class="status-dot" id="status-dot"></div><span id="status-text">Ready</span></div>
</div>

<!-- Edit entry modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit entry</span><button class="icon-action" onclick="closeModal('edit-modal')">✕</button></div>
    <label>Name *</label><input id="em-name">
    <label>Secondary field</label><input id="em-sub" placeholder="Customer, owner, phase…">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>Status</label><select id="em-status"></select></div>
      <div><label>Priority</label><select id="em-priority"><option value="">None</option><option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select></div>
    </div>
    <label>Due date</label><input id="em-due" type="date">
    <label>Notes</label><input id="em-note" placeholder="Brief context">
    <div id="em-progress-wrap" style="display:none"><label>Progress</label><div class="progress-row" style="margin-top:4px"><input type="range" min="0" max="100" step="1" id="em-progress" oninput="document.getElementById('em-pct').textContent=this.value+'%'"><span id="em-pct">0%</span></div></div>
    <div class="modal-actions">
      <button class="btn" style="color:var(--danger);border-color:rgba(248,113,113,.3)" onclick="deleteCurrentEdit()"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

      </div>

<div class="modal-overlay" id="people-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">People roster</span><button class="icon-action" onclick="closeModal('people-modal')">✕</button></div>
    <div id="people-list"></div>
    <div style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px">
      <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.07em">Add person</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label>Name *</label><input id="np-name" placeholder="Full name"></div>
        <div><label>Role / title</label><input id="np-role" placeholder="e.g. Engineer"></div>
      </div>

    <div class="modal-actions"><button class="btn" onclick="closeModal('people-modal')">Done</button><button class="btn primary" onclick="addPerson()">Add</button></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://ipfptninebzvyzgsnifh.supabase.co';
const SUPABASE_KEY='sb_publishable_Oo9LlNGt7iDJU7y8XTkq1A_XbeBQRGv';
const IS_CONFIGURED=true;

const STATUS_OPTIONS=[
  {v:'active',l:'Active'},{v:'hold',l:'On hold'},{v:'complete',l:'Complete'},
  {v:'dev',l:'In development'},{v:'pilot',l:'Pilot'},{v:'open',l:'Open / needed'}
];
const TASK_STATUSES=[
  {v:'open',l:'Open'},{v:'progress',l:'In progress'},{v:'done',l:'Done'},{v:'blocked',l:'Blocked'}
];
const BADGES={active:'b-active',hold:'b-hold',complete:'b-complete',dev:'b-dev',pilot:'b-pilot',open:'b-open'};
const TBADGES={open:'b-task-open',progress:'b-task-progress',done:'b-task-done',blocked:'b-task-blocked'};
const PBADGES={high:'b-high',med:'b-med',low:'b-low'};

let db=null;
let sections=[],items={},people=[];
let taskCache={},histCache={},fileCache={};
let activeId=null,activePanelItemId=null,activePanelSectionId=null;
let activeTab='overview';
let addOpen=false,editTarget=null;
let filterStatus='',filterSearch='';
let addTaskOpen=false,addFileOpen=false;

async function init(){
  if(IS_CONFIGURED){
    db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    await loadData();
  } else {
    loadLocal();
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  renderAll();
}

async function loadData(){
  setStatus('loading','Loading…');
  try{
    const {data:secs}=await db.from('sections').select('*').order('sort_order');
    sections=secs||[];
    for(const s of sections){
      const {data:its}=await db.from('items').select('*').eq('section_id',s.id).order('sort_order');
      items[s.id]=its||[];
    }
    if(!sections.length) await seedSections();
    const {data:pp}=await db.from('people').select('*').order('name');
    people=pp||[];
    activeId=sections[0]?.id||null;
    setStatus('ok','Connected · Supabase · '+new Date().toLocaleTimeString());
  } catch(e){
    setStatus('error','Connection error');
    loadLocal();
  }
}

async function seedSections(){
  const defaults=[
    {name:'Customer projects',icon:'ti-briefcase',color:'#38bdf8',progress:false,sort_order:0},
    {name:'Technology',icon:'ti-cpu',color:'#a78bfa',progress:true,sort_order:1},
    {name:'Product scale-up',icon:'ti-arrow-up-right',color:'#2dd4bf',progress:true,sort_order:2},
    {name:'Resources',icon:'ti-building',color:'#fbbf24',progress:false,sort_order:3},
  ];
  const {data}=await db.from('sections').insert(defaults).select();
  sections=data||[];sections.forEach(s=>{items[s.id]=[];});
}

const LS='wo-v2';
function loadLocal(){
  try{const s=JSON.parse(localStorage.getItem(LS)||'{}');sections=s.sections||defaultSections();items=s.items||{};people=s.people||[];sections.forEach(s=>{if(!items[s.id])items[s.id]=[];});activeId=sections[0]?.id||null;setStatus('ok','Local storage');}catch(e){sections=defaultSections();sections.forEach(s=>{items[s.id]=[];});activeId=sections[0]?.id||null;}
}
function saveLocal(){localStorage.setItem(LS,JSON.stringify({sections,items,people}));setStatus('ok','Saved · '+new Date().toLocaleTimeString());}
function defaultSections(){return[{id:'s1',name:'Customer projects',icon:'ti-briefcase',color:'#38bdf8',progress:false,sort_order:0},{id:'s2',name:'Technology',icon:'ti-cpu',color:'#a78bfa',progress:true,sort_order:1},{id:'s3',name:'Product scale-up',icon:'ti-arrow-up-right',color:'#2dd4bf',progress:true,sort_order:2},{id:'s4',name:'Resources',icon:'ti-building',color:'#fbbf24',progress:false,sort_order:3}];}

function setStatus(state,msg){
  const dot=document.getElementById('status-dot');
  const txt=document.getElementById('status-text');
  dot.className='status-dot'+(state==='error'?' error':state==='loading'?' loading':'');
  txt.textContent=msg;
}

function renderAll(){renderNav();renderMain();}

function renderNav(){
  const sb=document.getElementById('sidebar');
  const tb=document.getElementById('tabbar');
  sb.innerHTML='<div class="sidebar-label">Sections</div>'+
    sections.map(s=>`<div class="sb-item${s.id===activeId?' active':''}" onclick="switchSection('${s.id}')">
      <span style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
      <i class="ti ${s.icon}" aria-hidden="true"></i>
      <span class="sb-item-name">${s.name}</span>
      <span class="sb-count">${(items[s.id]||[]).length}</span>
    </div>`).join('')+
    '<button class="sb-add-btn" onclick="openManage()"><i class="ti ti-plus"></i> New section</button>';
  tb.innerHTML=sections.map(s=>`<div class="tab-item${s.id===activeId?' active':''}" onclick="switchSection('${s.id}')">
    <i class="ti ${s.icon}" aria-hidden="true"></i>
    <span class="tab-lbl">${s.name.split(' ')[0]}</span>
  </div>`).join('');
}

function renderMain(){
  const el=document.getElementById('main-inner');
  const sec=sections.find(s=>s.id===activeId);
  if(!sec){el.innerHTML='<div class="empty-row">No sections yet.</div>';return;}
  const all=items[sec.id]||[];
  const filtered=all.filter(e=>{
    if(filterStatus&&e.status!==filterStatus)return false;
    if(filterSearch){const q=filterSearch.toLowerCase();return e.name.toLowerCase().includes(q)||(e.sub||'').toLowerCase().includes(q)||(e.note||'').toLowerCase().includes(q);}
    return true;
  });
  const total=all.length,active=all.filter(e=>e.status==='active').length;
  const done=all.filter(e=>e.status==='complete'||e.status==='pilot').length,hold=all.filter(e=>e.status==='hold').length;
  const today=new Date().toISOString().split('T')[0];
  const rows=filtered.length?filtered.map(e=>{
    const bc=BADGES[e.status]||'b-hold';
    const sl=STATUS_OPTIONS.find(o=>o.v===e.status)?.l||e.status;
    const pb=e.priority?`<span class="badge ${PBADGES[e.priority]||''}">${e.priority}</span>`:'';
    const due=e.due_date?`<span class="due-tag${e.due_date<today?' overdue':''}"><i class="ti ti-calendar" style="font-size:11px"></i> ${e.due_date}</span>`:'';
    const prog=sec.progress?`<div class="pbar-wrap"><div class="pbar"><div class="pfill" style="width:${e.progress||0}%;background:${sec.color}"></div></div><span class="pct">${e.progress||0}%</span></div>`:'';
    const isActive=activePanelItemId===e.id;
    return`<div class="erow${isActive?' ':''}" style="${isActive?'background:var(--bg3);border-left:3px solid var(--accent);':''}">
      <div class="einfo">
        <div class="ename">${e.name}</div>
        ${e.sub||e.note?`<div class="emeta">${[e.sub,e.note].filter(Boolean).join(' · ')}</div>`:''}
      </div>
      ${due}${prog}${pb}
      <span class="badge ${bc}">${sl}</span>
      <div class="row-actions">
        <button class="icon-action accent" onclick="openPanel('${sec.id}','${e.id}')" title="Open detail"><i class="ti ti-layout-sidebar-right"></i></button>
        <button class="icon-action" onclick="openEdit('${sec.id}','${e.id}')" title="Edit"><i class="ti ti-edit"></i></button>
        <button class="icon-action danger" onclick="confirmDelete('${sec.id}','${e.id}')" title="Delete"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join(''):`<div class="empty-row">${filterStatus||filterSearch?'No matching entries.':'No entries yet — use Add entry to get started.'}</div>`;

  el.innerHTML=
    (!IS_CONFIGURED?'<div class="config-banner"><i class="ti ti-alert-triangle"></i> Using local storage — add Supabase credentials for cloud sync.</div>':'')+
    (addOpen?renderAddPanel(sec):'')+
    `<div class="sec-header">
      <span class="sec-dot" style="background:${sec.color}"></span>
      <span class="sec-name">${sec.name}</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-lbl">Total</div><div class="metric-val">${total}</div></div>
      <div class="metric"><div class="metric-lbl">Active</div><div class="metric-val">${active}</div></div>
      <div class="metric"><div class="metric-lbl">Done</div><div class="metric-val">${done}</div></div>
      <div class="metric"><div class="metric-lbl">On hold</div><div class="metric-val">${hold}</div></div>
    </div>
    <div class="filter-bar">
      <input placeholder="Search…" oninput="setSearch(this.value)" value="${filterSearch}">
      <select onchange="setFilter(this.value)">
        <option value="">All statuses</option>
        ${STATUS_OPTIONS.map(o=>`<option value="${o.v}"${filterStatus===o.v?' selected':''}>${o.l}</option>`).join('')}
      </select>
    </div>
    <div class="entry-list">${rows}</div>`;
}

/* ── Detail panel ── */
async function openPanel(section_id,item_id){
  activePanelSectionId=section_id;
  activePanelItemId=item_id;
  activeTab='overview';
  addTaskOpen=false;addFileOpen=false;
  await loadPanelData(item_id);
  renderPanel();
  document.getElementById('detail-panel').classList.remove('closed');
  renderMain();
}

function closePanel(){
  document.getElementById('detail-panel').classList.add('closed');
  activePanelItemId=null;activePanelSectionId=null;
  renderMain();
}

async function loadPanelData(item_id){
  if(!IS_CONFIGURED)return;
  try{
    const [{data:tasks},{data:hist},{data:files}]=await Promise.all([
      db.from('tasks').select('*').eq('item_id',item_id).order('sort_order'),
      db.from('history').select('*').eq('item_id',item_id).order('created_at',{ascending:false}),
      db.from('files').select('*').eq('item_id',item_id).order('created_at')
    ]);
    taskCache[item_id]=tasks||[];
    histCache[item_id]=hist||[];
    fileCache[item_id]=files||[];
  }catch(e){taskCache[item_id]=taskCache[item_id]||[];histCache[item_id]=histCache[item_id]||[];fileCache[item_id]=fileCache[item_id]||[];}
}

function renderPanel(){
  const sec=sections.find(s=>s.id===activePanelSectionId);
  const item=(items[activePanelSectionId]||[]).find(i=>i.id===activePanelItemId);
  if(!item)return;
  const tabs=['overview','tasks','history','notes','files'];
  const tabLabels={overview:'Overview',tasks:'Tasks',history:'History',notes:'Notes',files:'Files'};
  const taskCount=(taskCache[item.id]||[]).filter(t=>t.status!=='done').length;
  const pi=document.getElementById('panel-inner');
  pi.innerHTML=`
    <div class="panel-topbar">
      <span class="panel-title">${item.name}</span>
      <button class="icon-action" onclick="closePanel()" title="Close panel"><i class="ti ti-x"></i></button>
    </div>
    <div class="panel-tabs">
      ${tabs.map(t=>`<div class="ptab${activeTab===t?' active':''}" onclick="switchTab('${t}')">${tabLabels[t]}${t==='tasks'&&taskCount?` <span style="font-size:10px;background:rgba(56,189,248,.15);color:var(--accent);padding:1px 5px;border-radius:10px">${taskCount}</span>`:''}</div>`).join('')}
    </div>
    <div class="panel-body" id="panel-body"></div>`;
  renderTab(sec,item);
}

function renderTab(sec,item){
  const pb=document.getElementById('panel-body');
  if(!pb)return;
  if(activeTab==='overview') pb.innerHTML=renderOverviewTab(sec,item);
  else if(activeTab==='tasks') pb.innerHTML=renderTasksTab(item);
  else if(activeTab==='history') pb.innerHTML=renderHistoryTab(item);
  else if(activeTab==='notes') pb.innerHTML=renderNotesTab(item);
  else if(activeTab==='files') pb.innerHTML=renderFilesTab(item);
}

function renderOverviewTab(sec,item){
  const opts=STATUS_OPTIONS.map(o=>`<option value="${o.v}"${item.status===o.v?' selected':''}>${o.l}</option>`).join('');
  return`<div class="p-section">
    <div class="p-section-title">Scope &amp; requirements</div>
    <textarea class="p-textarea" id="ov-scope" placeholder="Describe the scope, objectives, and requirements for this item…">${item.scope||''}</textarea>
  </div>
  <div class="ov-grid">
    <div class="ov-field"><div class="ov-label">Status</div><select class="p-select" id="ov-status">${opts}</select></div>
    <div class="ov-field"><div class="ov-label">Priority</div>
      <select class="p-select" id="ov-priority">
        <option value=""${!item.priority?' selected':''}>None</option>
        <option value="high"${item.priority==='high'?' selected':''}>High</option>
        <option value="med"${item.priority==='med'?' selected':''}>Medium</option>
        <option value="low"${item.priority==='low'?' selected':''}>Low</option>
      </select>
    </div>
    <div class="ov-field"><div class="ov-label">Secondary field</div><input class="p-input" id="ov-sub" value="${item.sub||''}" placeholder="Customer, owner, phase…"></div>
    <div class="ov-field"><div class="ov-label">Due date</div><input class="p-input" type="date" id="ov-due" value="${item.due_date||''}"></div>
  </div>
  ${sec?.progress?`<div class="p-section"><div class="p-section-title">Progress</div><div class="progress-row"><input type="range" min="0" max="100" step="1" id="ov-progress" value="${item.progress||0}" oninput="document.getElementById('ov-pct').textContent=this.value+'%'"><span id="ov-pct">${item.progress||0}%</span></div></div>`:''}
  <button class="save-btn" onclick="saveOverview()"><i class="ti ti-check"></i> Save overview</button>`;
}

function renderTasksTab(item){
  const tasks=taskCache[item.id]||[];
  const open=tasks.filter(t=>t.status!=='done');
  const done=tasks.filter(t=>t.status==='done');
  const addForm=addTaskOpen?`<div class="add-form">
    <div class="add-form-title">New task</div>
    <div class="form-row"><input id="nt-desc" placeholder="Task description *" style="flex:2"></div>
    <div class="form-row">
      <select id="nt-status">${TASK_STATUSES.map(s=>`<option value="${s.v}">${s.l}</option>`).join('')}</select>
      <input id="nt-due" type="date" style="width:130px;flex-shrink:0">
    </div>
    <div class="form-row"><input id="nt-resources" placeholder="Resources required"></div>
    <div class="add-form-title" style="margin-top:8px">Responsible person(s)</div>
    <div id="nt-people-chips" class="people-wrap" style="margin-bottom:8px"></div>
    <div class="form-row">
      <select id="nt-person-select"><option value="">Pick from roster…</option>${people.map(p=>`<option value="${p.name}">${p.name}${p.role?' ('+p.role+')':''}</option>`).join('')}</select>
      <input id="nt-person-free" placeholder="Or type a name">
      <button class="small-btn" onclick="addTaskPerson()">Add</button>
    </div>
    <div class="form-actions">
      <button class="small-btn" onclick="addTaskOpen=false;renderPanel()">Cancel</button>
      <button class="save-btn" onclick="submitTask('${item.id}')">Save task</button>
    </div>
  </div>`:'';
  const openRows=open.length?open.map(t=>renderTaskCard(t,item.id)).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:8px 0">No open tasks.</div>';
  const doneRows=done.length?`<div class="p-section-title" style="margin-top:16px">Completed tasks</div>`+done.map(t=>renderTaskCard(t,item.id)).join(''):'';
  return`<button class="small-btn" style="margin-bottom:12px" onclick="addTaskOpen=true;renderPanel()"><i class="ti ti-plus"></i> New task</button>
    ${addForm}
    <div class="p-section-title">Open tasks</div>
    ${openRows}${doneRows}`;
}

function renderTaskCard(t,item_id){
  const bc=TBADGES[t.status]||'b-task-open';
  const sl=TASK_STATUSES.find(s=>s.v===t.status)?.l||t.status;
  const today=new Date().toISOString().split('T')[0];
  const dueStr=t.due_date?`<span class="${t.due_date<today&&t.status!=='done'?'':''}"><i class="ti ti-calendar"></i> ${t.due_date}</span>`:'';
  const resp=t.responsible?`<span><i class="ti ti-user"></i> ${t.responsible}</span>`:'';
  const res=t.resources?`<span><i class="ti ti-tool"></i> ${t.resources}</span>`:'';
  return`<div class="task-card">
    <div class="task-card-header">
      <span class="task-desc">${t.description}</span>
      <span class="badge ${bc}">${sl}</span>
    </div>
    <div class="task-meta">${[dueStr,resp,res].filter(Boolean).join('')}</div>
    <div class="task-actions">
      ${t.status!=='done'?`<button class="small-btn success" onclick="completeTask('${item_id}','${t.id}')"><i class="ti ti-check"></i> Done → History</button>`:''}
      ${TASK_STATUSES.filter(s=>s.v!==t.status&&s.v!=='done').map(s=>`<button class="small-btn" onclick="updateTaskStatus('${item_id}','${t.id}','${s.v}')">${s.l}</button>`).join('')}
      <button class="small-btn danger" onclick="deleteTask('${item_id}','${t.id}')"><i class="ti ti-trash"></i></button>
    </div>
  </div>`;
}

function renderHistoryTab(item){
  const hist=histCache[item.id]||[];
  const entries=hist.length?hist.map((h,i)=>`<div class="hist-entry">
    <div class="hist-line">
      <div class="hist-dot" style="${h.entry_type==='task'?'background:var(--success)':''}"></div>
      ${i<hist.length-1?'<div class="hist-connector"></div>':''}
    </div>
    <div class="hist-content">
      <div class="hist-text">${h.entry}</div>
      <div class="hist-time">${new Date(h.created_at).toLocaleString()}${h.entry_type==='task'?' · Task completed':h.entry_type==='note'?' · Note':''}</div>
    </div>
  </div>`).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic">No history yet. Completed tasks and manual entries will appear here.</div>';
  return`<div class="add-form" style="margin-bottom:14px">
    <div class="add-form-title">Add manual entry</div>
    <div class="form-row"><input id="h-entry" placeholder="Progress note, milestone, decision…" style="flex:1"></div>
    <div class="form-actions"><button class="save-btn" onclick="addHistEntry('${item.id}')">Add to history</button></div>
  </div>
  <div class="p-section-title">History log</div>
  ${entries}`;
}

function renderNotesTab(item){
  return`<div class="p-section">
    <div class="p-section-title">Notes</div>
    <textarea class="p-textarea" id="notes-body" style="min-height:200px" placeholder="Freeform notes, observations, decisions, ideas…">${item.note||''}</textarea>
  </div>
  <button class="save-btn" onclick="saveNotes('${item.id}')"><i class="ti ti-check"></i> Save notes</button>`;
}

function renderFilesTab(item){
  const files=fileCache[item.id]||[];
  const addForm=addFileOpen?`<div class="add-form" style="margin-bottom:12px">
    <div class="add-form-title">Add file / link</div>
    <div class="form-row"><input id="nf-label" placeholder="Label / name *"></div>
    <div class="form-row"><input id="nf-url" placeholder="URL (https://…) or file path (\\\\server\\share\\file)"></div>
    <div class="form-row"><input id="nf-desc" placeholder="Description (optional)"></div>
    <div class="form-actions">
      <button class="small-btn" onclick="addFileOpen=false;renderPanel()">Cancel</button>
      <button class="save-btn" onclick="submitFile('${item.id}')">Save</button>
    </div>
  </div>`:'';
  const fileRows=files.length?files.map(f=>`<div class="file-item">
    <i class="ti ${f.url.startsWith('http')?'ti-external-link':'ti-file'}" style="color:var(--text3);font-size:16px;flex-shrink:0" aria-hidden="true"></i>
    <div class="file-label">
      <div class="file-name" onclick="openFile('${f.url}')">${f.label}</div>
      ${f.description?`<div class="file-desc">${f.description}</div>`:''}
    </div>
    <button class="icon-action danger" onclick="deleteFile('${item.id}','${f.id}')"><i class="ti ti-trash"></i></button>
  </div>`).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:8px 0">No files linked yet.</div>';
  return`<button class="small-btn" style="margin-bottom:12px" onclick="addFileOpen=true;renderPanel()"><i class="ti ti-plus"></i> Add file / link</button>
    ${addForm}
    <div class="p-section-title">Linked files &amp; resources</div>
    ${fileRows}`;
}

function switchTab(tab){
  activeTab=tab;addTaskOpen=false;addFileOpen=false;
  const sec=sections.find(s=>s.id===activePanelSectionId);
  const item=(items[activePanelSectionId]||[]).find(i=>i.id===activePanelItemId);
  document.querySelectorAll('.ptab').forEach(el=>el.classList.toggle('active',el.textContent.trim().startsWith(tab.charAt(0).toUpperCase()+tab.slice(1))));
  renderTab(sec,item);
}

/* ── Task actions ── */
let newTaskPeople=[];
function addTaskPerson(){
  const sel=document.getElementById('nt-person-select');
  const free=document.getElementById('nt-person-free');
  const name=(sel?.value||free?.value||'').trim();
  if(!name)return;
  if(!newTaskPeople.includes(name))newTaskPeople.push(name);
  if(sel)sel.value='';
  if(free)free.value='';
  renderTaskPeopleChips();
}
function renderTaskPeopleChips(){
  const wrap=document.getElementById('nt-people-chips');
  if(!wrap)return;
  wrap.innerHTML=newTaskPeople.map((p,i)=>`<div class="person-chip">${p}<button onclick="removeTaskPerson(${i})">✕</button></div>`).join('');
}
function removeTaskPerson(i){newTaskPeople.splice(i,1);renderTaskPeopleChips();}

async function submitTask(item_id){
  const desc=(document.getElementById('nt-desc')?.value||'').trim();
  if(!desc)return;
  const task={
    item_id,description:desc,
    status:document.getElementById('nt-status')?.value||'open',
    due_date:document.getElementById('nt-due')?.value||null,
    responsible:newTaskPeople.join(', '),
    resources:document.getElementById('nt-resources')?.value.trim()||'',
    sort_order:(taskCache[item_id]||[]).length
  };
  if(IS_CONFIGURED){
    const {data}=await db.from('tasks').insert(task).select().single();
    (taskCache[item_id]=taskCache[item_id]||[]).push(data);
  } else {
    (taskCache[item_id]=taskCache[item_id]||[]).push({...task,id:'t-'+Date.now(),created_at:new Date().toISOString()});
  }
  newTaskPeople=[];addTaskOpen=false;
  renderPanel();
}

async function completeTask(item_id,task_id){
  const task=(taskCache[item_id]||[]).find(t=>t.id===task_id);
  if(!task)return;
  const histEntry={item_id,entry:`Task completed: ${task.description}${task.responsible?' ('+task.responsible+')':''}`,entry_type:'task'};
  if(IS_CONFIGURED){
    await db.from('tasks').update({status:'done',updated_at:new Date().toISOString()}).eq('id',task_id);
    const {data:h}=await db.from('history').insert(histEntry).select().single();
    (histCache[item_id]=histCache[item_id]||[]).unshift(h);
  } else {
    const t=(taskCache[item_id]||[]).find(t=>t.id===task_id);
    if(t)t.status='done';
    (histCache[item_id]=histCache[item_id]||[]).unshift({...histEntry,id:'h-'+Date.now(),created_at:new Date().toISOString()});
  }
  const t=(taskCache[item_id]||[]).find(t=>t.id===task_id);
  if(t)t.status='done';
  renderPanel();
}

async function updateTaskStatus(item_id,task_id,status){
  const t=(taskCache[item_id]||[]).find(t=>t.id===task_id);
  if(!t)return;
  t.status=status;
  if(IS_CONFIGURED) await db.from('tasks').update({status,updated_at:new Date().toISOString()}).eq('id',task_id);
  renderPanel();
}

async function deleteTask(item_id,task_id){
  if(!confirm('Delete this task?'))return;
  taskCache[item_id]=(taskCache[item_id]||[]).filter(t=>t.id!==task_id);
  if(IS_CONFIGURED) await db.from('tasks').delete().eq('id',task_id);
  renderPanel();
}

/* ── History ── */
async function addHistEntry(item_id){
  const entry=(document.getElementById('h-entry')?.value||'').trim();
  if(!entry)return;
  const h={item_id,entry,entry_type:'note'};
  if(IS_CONFIGURED){
    const {data}=await db.from('history').insert(h).select().single();
    (histCache[item_id]=histCache[item_id]||[]).unshift(data);
  } else {
    (histCache[item_id]=histCache[item_id]||[]).unshift({...h,id:'h-'+Date.now(),created_at:new Date().toISOString()});
  }
  renderPanel();
}

/* ── Files ── */
async function submitFile(item_id){
  const label=(document.getElementById('nf-label')?.value||'').trim();
  const url=(document.getElementById('nf-url')?.value||'').trim();
  if(!label||!url)return;
  const f={item_id,label,url,description:document.getElementById('nf-desc')?.value.trim()||''};
  if(IS_CONFIGURED){
    const {data}=await db.from('files').insert(f).select().single();
    (fileCache[item_id]=fileCache[item_id]||[]).push(data);
  } else {
    (fileCache[item_id]=fileCache[item_id]||[]).push({...f,id:'f-'+Date.now(),created_at:new Date().toISOString()});
  }
  addFileOpen=false;renderPanel();
}

async function deleteFile(item_id,file_id){
  if(!confirm('Remove this link?'))return;
  fileCache[item_id]=(fileCache[item_id]||[]).filter(f=>f.id!==file_id);
  if(IS_CONFIGURED) await db.from('files').delete().eq('id',file_id);
  renderPanel();
}

function openFile(url){window.open(url,'_blank');}

/* ── Overview save ── */
async function saveOverview(){
  const item=(items[activePanelSectionId]||[]).find(i=>i.id===activePanelItemId);
  if(!item)return;
  const prog=document.getElementById('ov-progress');
  const patch={
    scope:document.getElementById('ov-scope')?.value||'',
    status:document.getElementById('ov-status')?.value||item.status,
    priority:document.getElementById('ov-priority')?.value||'',
    sub:document.getElementById('ov-sub')?.value.trim()||'',
    due_date:document.getElementById('ov-due')?.value||null,
    progress:prog?parseInt(prog.value):item.progress||0,
  };
  Object.assign(item,patch);
  if(IS_CONFIGURED) await db.from('items').update({...patch,updated_at:new Date().toISOString()}).eq('id',item.id);
  else saveLocal();
  setStatus('ok','Saved · '+new Date().toLocaleTimeString());
  renderMain();renderPanel();
}

/* ── Notes save ── */
async function saveNotes(item_id){
  const item=(items[activePanelSectionId]||[]).find(i=>i.id===item_id);
  if(!item)return;
  const note=document.getElementById('notes-body')?.value||'';
  item.note=note;
  if(IS_CONFIGURED) await db.from('items').update({note,updated_at:new Date().toISOString()}).eq('id',item_id);
  else saveLocal();
  setStatus('ok','Notes saved · '+new Date().toLocaleTimeString());
}

/* ── Add entry ── */
function renderAddPanel(sec){
  const opts=STATUS_OPTIONS.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
  return`<div class="add-panel">
    <div class="add-panel-title"><i class="ti ti-plus"></i> New entry in ${sec.name}</div>
    <div class="field-grid"><div class="field-group"><label>Name *</label><input id="a-name" placeholder="Entry name"></div><div class="field-group"><label>Secondary field</label><input id="a-sub" placeholder="Customer, owner, phase…"></div></div>
    <div class="field-grid three" style="margin-top:8px">
      <div class="field-group"><label>Status</label><select id="a-status">${opts}</select></div>
      <div class="field-group"><label>Priority</label><select id="a-priority"><option value="">None</option><option value="high">High</option><option value="med">Medium</option><option value="low">Low</option></select></div>
      <div class="field-group"><label>Due date</label><input id="a-due" type="date"></div>
    </div>
    <div class="field-grid one" style="margin-top:8px"><div class="field-group"><label>Notes</label><textarea id="a-note" placeholder="Brief context…"></textarea></div></div>
    ${sec.progress?`<div style="margin-top:8px"><div class="field-group"><label>Progress</label><div class="progress-row"><input type="range" min="0" max="100" step="1" id="a-progress" value="0" oninput="document.getElementById('a-pct').textContent=this.value+'%'"><span id="a-pct">0%</span></div></div></div>`:''}
    <div class="panel-actions"><button class="btn" onclick="cancelAdd()">Cancel</button><button class="btn primary" onclick="submitAdd()"><i class="ti ti-check"></i> Save</button></div>
  </div>`;
}

function openAddEntry(){addOpen=true;renderMain();setTimeout(()=>{document.getElementById('a-name')?.focus();},50);}
function cancelAdd(){addOpen=false;renderMain();}

async function submitAdd(){
  const sec=sections.find(s=>s.id===activeId);
  const name=(document.getElementById('a-name')?.value||'').trim();
  if(!name)return;
  const prog=document.getElementById('a-progress');
  const newItem={section_id:activeId,name,sub:document.getElementById('a-sub')?.value.trim()||'',note:document.getElementById('a-note')?.value.trim()||'',status:document.getElementById('a-status')?.value||'active',priority:document.getElementById('a-priority')?.value||'',due_date:document.getElementById('a-due')?.value||null,progress:prog?parseInt(prog.value):0,scope:'',sort_order:(items[activeId]||[]).length};
  setStatus('loading','Saving…');
  try{
    if(IS_CONFIGURED){const {data}=await db.from('items').insert(newItem).select().single();(items[activeId]=items[activeId]||[]).push(data);}
    else{(items[activeId]=items[activeId]||[]).push({...newItem,id:'i-'+Date.now(),created_at:new Date().toISOString()});saveLocal();}
    setStatus('ok','Saved · '+new Date().toLocaleTimeString());
  }catch(e){setStatus('error','Save failed');}
  addOpen=false;renderAll();
}

/* ── Edit entry ── */
let editSec=null,editIdx=-1;
function openEdit(section_id,item_id){
  editSec=section_id;
  const sec=sections.find(s=>s.id===section_id);
  const e=(items[section_id]||[]).find(i=>i.id===item_id);
  if(!e)return;
  editTarget={section_id,item_id};
  document.getElementById('em-name').value=e.name||'';
  document.getElementById('em-sub').value=e.sub||'';
  document.getElementById('em-note').value=e.note||'';
  document.getElementById('em-due').value=e.due_date||'';
  document.getElementById('em-priority').value=e.priority||'';
  document.getElementById('em-status').innerHTML=STATUS_OPTIONS.map(o=>`<option value="${o.v}"${e.status===o.v?' selected':''}>${o.l}</option>`).join('');
  const pw=document.getElementById('em-progress-wrap');
  pw.style.display=sec?.progress?'block':'none';
  const ep=document.getElementById('em-progress');
  if(ep){ep.value=e.progress||0;document.getElementById('em-pct').textContent=(e.progress||0)+'%';}
  openModal('edit-modal');
}

async function saveEdit(){
  if(!editTarget)return;
  const {section_id,item_id}=editTarget;
  const name=document.getElementById('em-name').value.trim();
  if(!name)return;
  const ep=document.getElementById('em-progress');
  const patch={name,sub:document.getElementById('em-sub').value.trim(),note:document.getElementById('em-note').value.trim(),status:document.getElementById('em-status').value,priority:document.getElementById('em-priority').value,due_date:document.getElementById('em-due').value||null};
  if(ep)patch.progress=parseInt(ep.value);
  const item=(items[section_id]||[]).find(i=>i.id===item_id);
  if(item)Object.assign(item,patch);
  if(IS_CONFIGURED) await db.from('items').update({...patch,updated_at:new Date().toISOString()}).eq('id',item_id);
  else saveLocal();
  closeModal('edit-modal');editTarget=null;
  renderAll();
  if(activePanelItemId===item_id)renderPanel();
}

async function deleteCurrentEdit(){
  if(!editTarget)return;
  if(!confirm('Delete this entry and all its tasks, history, and files?'))return;
  const {section_id,item_id}=editTarget;
  items[section_id]=(items[section_id]||[]).filter(i=>i.id!==item_id);
  if(IS_CONFIGURED) await db.from('items').delete().eq('id',item_id);
  else saveLocal();
  if(activePanelItemId===item_id)closePanel();
  closeModal('edit-modal');editTarget=null;renderAll();
}

async function confirmDelete(section_id,item_id){
  const e=(items[section_id]||[]).find(i=>i.id===item_id);
  if(!confirm(`Delete "${e?.name}"?`))return;
  items[section_id]=(items[section_id]||[]).filter(i=>i.id!==item_id);
  if(IS_CONFIGURED) await db.from('items').delete().eq('id',item_id);
  else saveLocal();
  if(activePanelItemId===item_id)closePanel();
  renderAll();
}

/* ── Sections ── */
async function addSection(){
  const name=document.getElementById('ns-name').value.trim();
  if(!name)return;
  const sec={name,icon:document.getElementById('ns-icon').value.trim()||'ti-folder',color:document.getElementById('ns-color').value,progress:document.getElementById('ns-progress').value==='1',sort_order:sections.length};
  if(IS_CONFIGURED){const {data}=await db.from('sections').insert(sec).select().single();sections.push(data);items[data.id]=[];}
  else{sections.push({...sec,id:'s-'+Date.now()});saveLocal();}
  document.getElementById('ns-name').value='';document.getElementById('ns-icon').value='';
  renderManageList();renderNav();
}

async function removeSection(id){
  const sec=sections.find(s=>s.id===id);
  if(!sec||!confirm(`Delete section "${sec.name}" and all its entries?`))return;
  if(activeId===id)activeId=sections.find(s=>s.id!==id)?.id||null;
  if(activePanelSectionId===id)closePanel();
  sections=sections.filter(s=>s.id!==id);delete items[id];
  if(IS_CONFIGURED) await db.from('sections').delete().eq('id',id);
  else saveLocal();
  renderManageList();renderAll();
}

function openManage(){renderManageList();openModal('manage-modal');}
function renderManageList(){
  document.getElementById('manage-list').innerHTML=sections.map(s=>
    `<div class="sec-mgmt-item">
      <span style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
      <i class="ti ${s.icon}" style="font-size:14px;color:var(--text3)"></i>
      <span style="flex:1;font-size:13px">${s.name}</span>
      <span style="font-size:11px;color:var(--text3)">${(items[s.id]||[]).length} items</span>
      ${sections.length>1?`<button class="icon-action danger" onclick="removeSection('${s.id}')"><i class="ti ti-trash"></i></button>`:''}
    </div>`).join('');
}

/* ── People ── */
async function addPerson(){
  const name=document.getElementById('np-name').value.trim();
  if(!name)return;
  const p={name,role:document.getElementById('np-role').value.trim()||''};
  if(IS_CONFIGURED){const {data}=await db.from('people').insert(p).select().single();people.push(data);}
  else{people.push({...p,id:'p-'+Date.now()});saveLocal();}
  document.getElementById('np-name').value='';document.getElementById('np-role').value='';
  renderPeopleList();
}

async function removePerson(id){
  people=people.filter(p=>p.id!==id);
  if(IS_CONFIGURED) await db.from('people').delete().eq('id',id);
  else saveLocal();
  renderPeopleList();
}

function openPeople(){renderPeopleList();openModal('people-modal');}
function renderPeopleList(){
  document.getElementById('people-list').innerHTML=people.length?people.map(p=>
    `<div class="sec-mgmt-item">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(56,189,248,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0">${p.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">${p.name}</div>${p.role?`<div style="font-size:11px;color:var(--text3)">${p.role}</div>`:''}</div>
      <button class="icon-action danger" onclick="removePerson('${p.id}')"><i class="ti ti-trash"></i></button>
    </div>`).join(''):'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:8px 0">No people added yet.</div>';
}

/* ── Utilities ── */
function switchSection(id){activeId=id;filterStatus='';filterSearch='';addOpen=false;if(activePanelSectionId&&activePanelSectionId!==id)closePanel();renderAll();}
function setFilter(v){filterStatus=v;renderMain();}
function setSearch(v){filterSearch=v;renderMain();}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('edit-modal');closeModal('manage-modal');closeModal('people-modal');if(addOpen){addOpen=false;renderMain();}}});

init();
</script>
</body>
</html>
